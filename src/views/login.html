<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.2/css/all.css"
        integrity="sha384-oS3vJWv+0UjzBfQzYUhtDYW+Pj2yciDJxpsK1OYPAYjqT085Qq/1cq5FLXAZQ7Ay" crossorigin="anonymous">

    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div class="container">
        <div class="content first-content">
            <div class="first-column">
                <h2 class="title title-primary">Bem-Vindo(a)!</h2>
                <p class="description description-primary">Para manter-se conectado(a)</p>
                <p class="description description-primary">faça login com as suas informações pessoais</p>
                <button id="signin" class="btn btn-primary">Entrar</button>
            </div>    
            <div class="second-column">
                <h2 class="title title-second">Crie uma conta</h2>
                
                <div class="social-media">
                   </div>

                <p class="description description-second">ou utilize o seu email para o registro:</p>
                
                <form action="/register" method="POST" class="form" id="form-register">
                    
                    <label class="label-input">
                        <i class="far fa-user icon-modify"></i>
                        <input type="text" name="username" placeholder="Nome" id="name-register" required>
                    </label>
                    
                    <label class="label-input">
                        <i class="far fa-envelope icon-modify"></i>
                        <input type="email" name="email" placeholder="Email" id="email-register" required>
                    </label>
                    
                    <label class="label-input">
                        <i class="fas fa-lock icon-modify"></i>
                        <input type="password" name="password" placeholder="Senha" id="password-register" required>
                    </label>
                    
                    <button type="submit" class="btn btn-second">Criar Conta</button>      
                </form>
            </div>
        </div>

        <div class="content second-content">
            <div class="first-column">
                <h2 class="title title-primary">Olá, amigo(a)!</h2>
                <p class="description description-primary">Insira os seus dados pessoais</p>
                <p class="description description-primary">e inicie sua jornada conosco</p>
                <button id="signup" class="btn btn-primary">Inscrever-se</button>
            </div>
            <div class="second-column">
                <h2 class="title title-second">Área do aluno(a)</h2>
                
                <div class="social-media">
                    </div>

                <p class="description description-second">ou utilize o seu email para entrar:</p>
                
                <form class="form" action="/login" method="POST" id="form-login">
                
                    <label class="label-input">
                        <i class="far fa-envelope icon-modify"></i>
                        <input type="email" name="email" placeholder="Email" id="email-login" required>
                    </label>
                
                    <label class="label-input">
                        <i class="fas fa-lock icon-modify"></i>
                        <input type="password" name="password" placeholder="Senha" id="password-login" required>
                    </label>
                
                    <a class="password" href="#">Esqueceu a senha?</a>
                    
                    <button type="submit" class="btn btn-second">Entrar</button>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/script.js"></script>
</body>
</html>
